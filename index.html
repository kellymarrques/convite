<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Charles & Kelly</title>

<style>

body{
margin:0;
background:white;
}

/* tela inicial envelope */

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:url("envelope.png") center center no-repeat;
background-size:cover;

z-index:9999;
transition:opacity 0.8s ease;
}

/* área invisível clicável sobre a frase */

#areaClique{

position:absolute;

/* AJUSTE FINO DA POSIÇÃO */
top:52%;

/* centraliza horizontalmente */
left:50%;

transform:translate(-50%, -50%);

/* tamanho da área clicável */
width:280px;
height:90px;

cursor:pointer;

}

/* convite */

img{
width:100%;
height:auto;
display:block;
}

</style>
</head>

<body>

<div id="overlay">

<div id="areaClique"></div>

</div>

<audio id="musica" loop preload="auto">
<source src="musica.mp3" type="audio/mpeg">
</audio>

<img src="convite.png">

<script>

const areaClique = document.getElementById("areaClique");
const overlay = document.getElementById("overlay");
const audio = document.getElementById("musica");

areaClique.addEventListener("click", () => {

audio.play();

overlay.style.opacity="0";

setTimeout(()=>{
overlay.style.display="none";
},800);

});

</script>

</body>
</html>
