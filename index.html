<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Charles & Kelly</title>

<style>

body{
margin:0;
background:white;
}

/* envelope inicial */

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:url("envelope.png") center center no-repeat;
background-size:cover;

z-index:9999;
transition:opacity 0.8s ease;
}

/* área clicável do envelope */

#areaClique{
position:absolute;
top:52%;
left:50%;
transform:translate(-50%, -50%);
width:280px;
height:90px;
cursor:pointer;
}

/* container do convite */

.container{
position:relative;
width:100%;
}

/* imagem do convite */

.container img{
width:100%;
height:auto;
display:block;
}

/* botões invisíveis */

.btn-localizacao,
.btn-manual,
.btn-presentes,
.btn-site{

position:absolute;
left:50%;
transform:translateX(-50%);

width:260px;
height:55px;

display:block;
}

/* posições ajustadas conforme seu layout */

.btn-localizacao{
top:74.2%;
}

.btn-manual{
top:77.4%;
}

.btn-presentes{
top:80.6%;
}

.btn-site{
top:83.8%;
}

</style>
</head>

<body>

<div id="overlay">
<div id="areaClique"></div>
</div>

<audio id="musica" loop preload="auto">
<source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="container">

<img src="convite.png">

<a href="https://share.google/SNkSSHwMZ7EGleort" class="btn-localizacao"></a>

<a href="https://sites.icasei.com.br/kellyecharles/places/18" class="btn-manual"></a>

<a href="https://sites.icasei.com.br/kellyecharles/pages/37082940" class="btn-presentes"></a>

<a href="https://sites.icasei.com.br/kellyecharles/home" class="btn-site"></a>

</div>

<script>

const areaClique = document.getElementById("areaClique");
const overlay = document.getElementById("overlay");
const audio = document.getElementById("musica");

areaClique.addEventListener("click", () => {

audio.play();

overlay.style.opacity="0";

setTimeout(()=>{
overlay.style.display="none";
},800);

});

</script>

</body>
</html>
