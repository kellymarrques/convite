<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charles & Kelly</title>

<style>
body{
margin:0;
background:white;
}
img{
width:100%;
height:auto;
display:block;
}
</style>
</head>

<body>

<audio id="musica" loop preload="auto">
<source src="musica.mp3" type="audio/mpeg">
</audio>

<img src="convite.png">

<script>
const audio = document.getElementById("musica");

function iniciarAudio(){
audio.volume = 1;
audio.play();
window.removeEventListener("scroll", iniciarAudio);
window.removeEventListener("touchstart", iniciarAudio);
}

window.addEventListener("scroll", iniciarAudio);
window.addEventListener("touchstart", iniciarAudio);
</script>

</body>
</html>
