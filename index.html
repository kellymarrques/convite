<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Charles & Kelly</title>

<style>

body{
margin:0;
background:white;
}

/* ENVELOPE INICIAL */

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:url("envelope.png") center center no-repeat;
background-size:cover;

z-index:9999;
transition:opacity 0.8s ease;
}

/* ÁREA CLICÁVEL SOBRE A FRASE DO ENVELOPE */

#areaClique{
position:absolute;
top:52%;
left:50%;
transform:translate(-50%, -50%);
width:280px;
height:90px;
cursor:pointer;
}

/* CONTAINER DO CONVITE */

.container{
position:relative;
width:100%;
}

/* IMAGEM DO CONVITE */

.container img{
width:100%;
height:auto;
display:block;
}

/* BOTÕES CLICÁVEIS (RESPONSIVOS) */

.btn-localizacao,
.btn-manual,
.btn-presentes,
.btn-site{

position:absolute;
left:50%;
transform:translateX(-50%);

width:72%;
height:4.6%;

display:block;
z-index:10;
}

/* POSIÇÕES AJUSTADAS PARA SEU LAYOUT */

.btn-localizacao{
top:72.8%;
}

.btn-manual{
top:76.6%;
}

.btn-presentes{
top:80.4%;
}

.btn-site{
top:84.2%;
}

</style>
</head>

<body>

<!-- ENVELOPE -->

<div id="overlay">
<div id="areaClique"></div>
</div>

<!-- MÚSICA -->

<audio id="musica" loop preload="auto">
<source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- CONVITE + LINKS -->

<div class="container">

<img src="convite.png">

<a href="https://share.google/SNkSSHwMZ7EGleort" class="btn-localizacao"></a>

<a href="https://sites.icasei.com.br/kellyecharles/places/18" class="btn-manual"></a>

<a href="https://sites.icasei.com.br/kellyecharles/pages/37082940" class="btn-presentes"></a>

<a href="https://sites.icasei.com.br/kellyecharles/home" class="btn-site"></a>

</div>

<script>

const areaClique = document.getElementById("areaClique");
const overlay = document.getElementById("overlay");
const audio = document.getElementById("musica");

areaClique.addEventListener("click", () => {

audio.play();

overlay.style.opacity = "0";

setTimeout(()=>{
overlay.style.display = "none";
},800);

});

</script>

</body>
</html>
