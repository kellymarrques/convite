<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charles & Kelly</title>

<style>
body{
margin:0;
background:white;
}
img{
width:100%;
height:auto;
display:block;
}
</style>
</head>

<body>

<audio id="musica" autoplay loop muted playsinline preload="auto">
<source src="musica.mp3" type="audio/mpeg">
</audio>

<img src="convite.png">

<script>
window.addEventListener("load", function () {

const audio = document.getElementById("musica");

audio.play().then(() => {

setTimeout(() => {
audio.muted = false;
audio.volume = 1;
}, 400);

}).catch(() => {

document.addEventListener("touchstart", () => {
audio.muted = false;
audio.play();
}, { once: true });

});

});
</script>

</body>
</html>
