<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charles & Kelly</title>

<style>

body{
margin:0;
background:white;
font-family:Georgia, serif;
}

/* tela inicial com envelope */

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("envelope.png") center center no-repeat;
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:30px;
font-size:24px;
color:#ffffff;
letter-spacing:0.5px;
z-index:9999;
cursor:pointer;
transition:opacity 0.8s ease;
}

/* leve sombra no texto para legibilidade */

#overlay span{
background:rgba(0,0,0,0.25);
padding:14px 22px;
border-radius:6px;
}

/* imagem do convite */

img{
width:100%;
height:auto;
display:block;
}

</style>
</head>

<body>

<div id="overlay">
<span>Descubra o que este envelope guarda para você ✉️</span>
</div>

<audio id="musica" loop preload="auto">
<source src="musica.mp3" type="audio/mpeg">
</audio>

<img src="convite.png">

<script>

const overlay = document.getElementById("overlay");
const audio = document.getElementById("musica");

overlay.addEventListener("click", () => {

audio.play();

overlay.style.opacity = "0";

setTimeout(()=>{
overlay.style.display="none";
},800);

});

</script>

</body>
</html>
