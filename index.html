<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charles & Kelly</title>

<style>

body{
margin:0;
background:white;
}

/* faixa superior */

#barraSom{
position:fixed;
top:0;
left:0;
width:100%;
background:#ffffff;
color:#444;
text-align:center;
font-family:Georgia, serif;
font-size:16px;
padding:14px 10px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
cursor:pointer;
z-index:9999;
}

/* imagem do convite */

img{
width:100%;
height:auto;
display:block;
margin-top:52px;
}

</style>
</head>

<body>

<div id="barraSom">
Dê o play na nossa história antes de continuar ✨🎶
</div>

<audio id="musica" loop preload="auto">
<source src="musica.mp3" type="audio/mpeg">
</audio>

<img src="convite.png">

<script>

const barra = document.getElementById("barraSom");
const audio = document.getElementById("musica");

barra.addEventListener("click", () => {

audio.play();
barra.style.display = "none";

});

</script>

</body>
</html>
