<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Charles & Kelly</title>

<!-- fonte Playfair Display -->

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:white;
font-family:"Playfair Display", serif;
}

/* tela inicial com envelope */

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:url("envelope.png") center center no-repeat;
background-size:cover;

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;
z-index:9999;

transition:opacity 0.8s ease;
}

/* texto sobre o laço */

#textoEnvelope{

position:absolute;

/* ajuste vertical fino (posição do nó do laço) */
top:52%;

/* centraliza horizontalmente */
left:50%;
transform:translate(-50%, -50%);

font-size:clamp(18px, 2.4vw, 26px);

letter-spacing:2px;

text-transform:uppercase;

/* efeito small caps visual */
font-variant:small-caps;

color:#3a3a3a;

opacity:0;

/* animação suave */
animation:aparecer 2s ease forwards;

}

/* animação de entrada */

@keyframes aparecer{

0%{
opacity:0;
transform:translate(-50%, -45%);
}

100%{
opacity:1;
transform:translate(-50%, -50%);
}

}

/* convite */

img{
width:100%;
height:auto;
display:block;
}

</style>
</head>

<body>

<div id="overlay">

<div id="textoEnvelope">
Há algo especial esperando por você aqui dentro
</div>

</div>

<audio id="musica" loop preload="auto">
<source src="musica.mp3" type="audio/mpeg">
</audio>

<img src="convite.png">

<script>

const overlay = document.getElementById("overlay");
const audio = document.getElementById("musica");

overlay.addEventListener("click", () => {

audio.play();

overlay.style.opacity="0";

setTimeout(()=>{
overlay.style.display="none";
},800);

});

</script>

</body>
</html>
